<!doctype html>
<html lang="__LANG__">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__DOCUMENT_TITLE__</title>
__FONT_LINK__
<style>
  :root{--paper:#f3f4ef;--ink:#111411;--muted:#686e68;--line:#d6dad3;--accent:#ff6138;--accent-soft:#ffe0d7;--positive:#176b55;--font:"Cuebook Noi","PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
  *{box-sizing:border-box}
  html,body{margin:0;width:1244px;height:528px;overflow:hidden;background:var(--paper);color:var(--ink)}
  body{font-family:var(--font);font-synthesis:none;-webkit-font-smoothing:antialiased}
  .cuebook-canvas{position:relative;width:1244px;height:528px;overflow:hidden;background:var(--paper);padding:46px 58px 42px}
  .meta{display:flex;align-items:center;gap:12px;height:28px;font-size:18px;font-weight:650;letter-spacing:.02em;color:var(--muted)}
  .subject{color:var(--ink);font-weight:760}.dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .claim{font-weight:780;letter-spacing:-.035em;line-height:1.04;text-wrap:balance}.w{white-space:nowrap}
  .label{font-size:15px;line-height:1;font-weight:760;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
  .copy{font-size:25px;line-height:1.28;font-weight:600;text-wrap:pretty}
  .condition{color:var(--positive)}
  .verdict{display:grid;grid-template-columns:1.35fr .78fr;gap:64px;height:386px;padding-top:24px}
  .verdict .claim{font-size:69px;max-width:700px;align-self:center}
  .verdict .rail{border-left:1px solid var(--line);padding-left:34px;display:grid;align-content:center;gap:26px}
  .beat{display:grid;gap:8px}.beat+.beat{padding-top:20px;border-top:1px solid var(--line)}
  .proof{display:grid;grid-template-columns:.88fr 1.18fr;gap:54px;height:386px;padding-top:26px}
  .proof .claim{font-size:58px;align-self:end;padding-bottom:32px}
  .proof .field{position:relative;border:1px solid var(--line);border-radius:22px;background:#fff;padding:34px 38px;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}
  .proof .field:before{content:"";position:absolute;left:0;top:0;width:12px;height:100%;background:var(--accent)}
  .proof .evidence{font-size:34px;line-height:1.16;font-weight:730;align-self:center;max-width:560px}
  .proof .mechanism{font-size:21px;line-height:1.3;color:var(--muted);border-top:1px solid var(--line);padding-top:18px}
  .system{height:386px;padding-top:30px;display:grid;grid-template-rows:auto 1fr}
  .system .claim{font-size:52px;max-width:990px}
  .system .chain{display:grid;grid-template-columns:1fr 46px 1fr 46px 1fr;align-items:center;gap:14px}
  .node{height:156px;border-top:5px solid var(--accent);background:#fff;padding:24px 26px;display:grid;align-content:start;gap:12px;box-shadow:0 10px 28px rgba(25,32,24,.06)}
  .node:nth-of-type(3){border-color:var(--positive)}
  .arrow{font-size:34px;text-align:center;color:var(--muted)}
  .footer-note{position:absolute;left:58px;bottom:36px;font-size:15px;color:var(--muted);letter-spacing:.04em}
</style>
</head>
<body>
<main class="cuebook-canvas" data-cuebook-viewpoint data-cuebook-preview="fast-v1" data-cuebook-visual-contract="preview-fast-v1" data-width="1244" data-height="528" data-template-id="__TEMPLATE_ID__" data-direction-id="__DIRECTION_ID__">
  <div class="meta" data-visual-level="4"><span class="dot"></span><span class="subject">__SUBJECT__</span><span>·</span><span>__HORIZON__</span></div>
  __LAYOUT__
  <div class="footer-note" data-role="context" data-visual-level="4">__AS_OF__</div>
</main>
</body>
</html>
