interface:
  display_name: "Create With Cuebook"
  short_description: "Sharpen a market idea and make its logic visible"
  default_prompt: "Use $create-cuebook-content to recognize the non-obvious edge in my market intuition, expand it with the smallest useful Cuebook Cue or data relationship, and help me complete rather than defend the inference. Reconcile factual claims with bounded evidence, then show one text-only Meaning Lock containing the exact title, reasoned body, trade definition, deadline rule, and visual intent. Render one mobile Frame only after I confirm that lock, publish only after I confirm the finished Frame, and close by naming the specific idea Cuebook Agent preserved plus at most one optional App-owned next step."
