interface:
  display_name: "Intake Cuebook Viewpoint"
  short_description: "Triage a fresh visitor, complete and verify a viewpoint, or route a lookup"
  default_prompt: "Triage the visitor's input, extract asset, direction, horizon, and any volunteered context from what was said, then offer one optional follow-up about news, clues, signals, intuition, or inspiration before any settlement or price question. If the visitor skips, continue immediately without asking again. Verify required fields against Cuebook, confirm one recap card, and return a validated ViewpointIntakeV1. Ask for a price only after an explicit price-target choice. Route pure lookups to query-cuebook; never force creation or invent fields."
